<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vector Icon Editor Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=Montserrat:wght@400;700&family=Open+Sans:wght@400;700&family=Oswald:wght@400;700&family=Pacifico&family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&family=Raleway:wght@400;700&family=Roboto:wght@400;700&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="left-sidebar">
        <div id="layers-panel">
            <div class="panel-header">Layers</div>
            <div id="layers-list"></div>
        </div>
    </div>
    
    <div id="workspace">
        <div id="top-bar">
            <div class="menu-dropdown">
                <span class="menu-title">Archive</span>
                <div class="dropdown-content">
                    <div id="btn-export-svg">Export SVG</div>
                    <div id="btn-export-png">Export PNG</div>
                    <div id="btn-export-jpg">Export JPG</div>
                </div>
            </div>
        </div>

        <div id="canvas-container">
            <svg id="canvas" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
                <defs id="canvas-defs">
                    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
                        <circle cx="1" cy="1" r="0.5" fill="#444" />
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="#1a1a1a" id="bg-canvas" />
                <rect width="100%" height="100%" fill="url(#grid)" id="bg-grid" />
                <g id="layer-objects"></g>
            </svg>

            <div id="canvas-hud-left">
                <input type="checkbox" id="toggle-snap" checked title="Toggle Snap">
                <input type="number" id="snap-value" value="16" min="1" max="128">
                <span>px</span>
            </div>

            <div id="canvas-hud-right">
                <div id="shortcuts-toggle">
                    <span>Shortcuts</span>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </div>
                <div id="shortcuts-list" style="display: none;">
                    <div><b>Space / Mid Click</b> Pan</div>
                    <div><b>Scroll</b> Zoom Canvas</div>
                    <div><b>Ctrl + Click</b> Select Layer</div>
                    <div><b>Ctrl + Scroll</b> Scale Object</div>
                    <div><b>Alt + Scroll</b> Rotate Object</div>
                    <div><b>Shift + Scroll</b> Opacity</div>
                    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 6px 0;">
                    <div><b>Ctrl + G</b> Group</div>
                    <div><b>Ctrl + D</b> Duplicate</div>
                    <div><b>Delete</b> Remove</div>
                </div>
            </div>
        </div>
        
        <div id="panel-resizer"></div>
        <div id="shapes-panel">
            <div id="shapes-header">
                <div id="tools-left">
                    <button class="bool-btn" id="btn-add-text" title="Add Text"><img src="img/text.svg" alt="Text"></button>
                    <label class="bool-btn" title="Add Image Node" style="margin:0; cursor:pointer;">
                        <input type="file" id="btn-add-image" accept="image/*" style="display: none;">
                        <img src="img/image.svg" alt="Image">
                    </label>
                </div>
                <div id="boolean-tools">
                    <button class="bool-btn active" data-bool="union" title="Union"><img src="img/union.svg" alt="Union"></button>
                    <button class="bool-btn" data-bool="subtract" title="Subtract"><img src="img/subtract.svg" alt="Subtract"></button>
                    <button class="bool-btn" data-bool="intersect" title="Intersect"><img src="img/intersect.svg" alt="Intersect"></button>
                    <button class="bool-btn" data-bool="exclude" title="Exclude"><img src="img/exclude.svg" alt="Exclude"></button>
                    <button class="bool-btn" data-bool="flatten" title="Flatten"><img src="img/flatten.svg" alt="Flatten"></button>
                </div>
            </div>
            <div id="shapes-dock"></div>
        </div>
    </div>

    <div id="properties">
        <div class="panel-section">
            <label>Canvas</label>
            <div class="prop-row">
                <div class="prop-input-group">
                    <span class="scrub-label" id="lbl-canvas-w" title="Drag to resize">W</span>
                    <input type="number" id="inp-canvas-w" value="512">
                </div>
                <div class="prop-input-group">
                    <span class="scrub-label" id="lbl-canvas-h" title="Drag to resize">H</span>
                    <input type="number" id="inp-canvas-h" value="512">
                </div>
            </div>
        </div>

        <div class="panel-section" id="obj-props-section" style="opacity: 0.3; pointer-events: none;">
            <label>Transform</label>
            <div class="prop-row">
                <div class="prop-input-group">
                    <span class="scrub-label" id="lbl-obj-x" title="Drag to move X">X</span>
                    <input type="number" id="inp-obj-x" value="0">
                </div>
                <div class="prop-input-group">
                    <span class="scrub-label" id="lbl-obj-y" title="Drag to move Y">Y</span>
                    <input type="number" id="inp-obj-y" value="0">
                </div>
            </div>
            <div class="prop-row" style="position: relative;">
                <div class="prop-input-group">
                    <span class="scrub-label" id="lbl-obj-w" title="Drag to scale Width">W</span>
                    <input type="number" id="inp-obj-w" value="0" min="1">
                </div>
                <div class="prop-input-group">
                    <span class="scrub-label" id="lbl-obj-h" title="Drag to scale Height">H</span>
                    <input type="number" id="inp-obj-h" value="0" min="1">
                </div>
                <button id="btn-lock-ratio" class="active" title="Constrain Proportions">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                </button>
            </div>
        </div>

        <div class="panel-section" id="text-props-section" style="display: none;">
            <label>Text Content</label>
            <textarea id="inp-text-content" rows="2" placeholder="Type here..."></textarea>
            
            <label style="margin-top: 10px;">Typography</label>
            <select id="inp-text-font">
                <option value="sans-serif">System Sans-Serif</option>
                <option value="'Inter', sans-serif">Inter</option>
                <option value="'Roboto', sans-serif">Roboto</option>
                <option value="'Open Sans', sans-serif">Open Sans</option>
                <option value="'Montserrat', sans-serif">Montserrat</option>
                <option value="'Lato', sans-serif">Lato</option>
                <option value="'Poppins', sans-serif">Poppins</option>
                <option value="'Oswald', sans-serif">Oswald</option>
                <option value="'Raleway', sans-serif">Raleway</option>
                <option value="'Ubuntu', sans-serif">Ubuntu</option>
                <option value="'Playfair Display', serif">Playfair Display</option>
                <option value="'Merriweather', serif">Merriweather</option>
                <option value="'Pacifico', cursive">Pacifico</option>
            </select>
        </div>

        <div class="panel-section">
            <label>Fill Color</label>
            <input type="color" id="fill-color" value="#d9d9d9">
        </div>
        <div class="panel-section">
            <label>Image Fill (Mask)</label>
            <label class="file-upload-wrapper">
                <input type="file" id="fill-image" accept="image/*" style="display: none;">
                <div class="file-upload-btn">Choose Image...</div>
            </label>
        </div>
    </div>

    <script src="shapes.js"></script>
    <script src="layers.js"></script>
    <script src="shortcuts.js"></script>
    <script src="main.js"></script>
</body>
</html>
